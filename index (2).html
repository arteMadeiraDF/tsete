<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Artes madeira DF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ÍCONE NA ABA DO NAVEGADOR -->
  <link rel="icon" href="LogoPequeno.png" type="image/png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CAPA -->
<section id="capa">
  <div class="capa-conteudo">
    <h1 class="titulo-capa">Artes madeira DF</h1>
    
    <div class="capa-botoes">
      <button id="btnTrabalhos">Trabalhos</button>
    </div>
    
    <!-- SUB-BOTÕES -->
    <div id="subBotoes" class="hidden">
      <button data-target="quadros" class="btn-sub">Quadros</button>
      <button data-target="imans" class="btn-sub">Ímanes</button>
    </div>
  </div>
</section>

<!-- SITE (CONTEÚDO ESCONDIDO INICIALMENTE) -->
<section id="site" class="hidden">
  <button id="voltarCapa" class="voltar-menu">← Voltar para a Capa</button>
  
  <nav class="tabs">
    <ul>
      <li><button class="tab" data-tab="quadros">Quadros</button></li>
      <li><button class="tab" data-tab="imans">Ímanes</button></li>
    </ul>
  </nav>

  <div id="quadros" class="tab-content">
    <h2>Os Meus Quadros</h2>
    <div class="galeria" id="listaQuadros"></div>
  </div>

  <div id="imans" class="tab-content">
    <h2>Os Meus Ímanes</h2>
    <div class="galeria" id="listaImans"></div>
  </div>
</section>

<!-- MODAL COM TAMANHO FIXO -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <span class="close">✕</span>
    <div class="modal-flex">
      <div class="modal-col-img">
        <img id="modalImg" src="" alt="">
      </div>
      <div class="modal-col-info">
        <p><strong>Nome:</strong> <span id="modalTitulo"></span></p>
        <p><strong>Ano:</strong> <span id="modalAno"></span></p>
        <p><strong>Autor:</strong> <span id="modalAutor"></span></p>
        <p><strong>Número:</strong> <span id="modalNumero"></span></p>
        <div class="medidas-box">
          <p><strong>Medidas:</strong></p>
          <ul>
            <li><strong>Comp:</strong> <span id="modalComp"></span></li>
            <li><strong>Larg:</strong> <span id="modalLarg"></span></li>
            <li><strong>Esp:</strong> <span id="modalEsp"></span></li>
          </ul>
        </div>
        <p><strong>Descrição:</strong></p>
        <p id="modalDesc" class="descricao-texto"></p>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
